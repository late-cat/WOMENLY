<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Womenly</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="brand">🌸 WOMENLY <span>AI Health Assistant</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html" class="active">Login</a></li>
      </ul>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2 id="authTitle">Welcome Back</h2>
      <p class="subtitle" id="authSubtitle">Sign in to access your health dashboard</p>

      <div id="authAlert"></div>

      <form id="authForm" onsubmit="handleAuth(event)">
        <div class="form-group" id="nameGroup" style="display: none;">
          <label for="nameInput">Full Name</label>
          <input type="text" id="nameInput" placeholder="Your name">
        </div>

        <div class="form-group">
          <label for="emailInput">Email</label>
          <input type="email" id="emailInput" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="passwordInput">Password</label>
          <input type="password" id="passwordInput" placeholder="Min 6 characters" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="authBtn">Sign In</button>
      </form>

      <div class="auth-toggle">
        <span id="toggleText">Don't have an account?</span>
        <a href="#" onclick="toggleMode(event)" id="toggleLink">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
